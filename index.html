<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rail Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: #0D0D0D;
color: #F0EDE8;
font-family: 'Courier New', Courier, monospace;
min-height: 100vh;
padding: 32px 16px;
display: flex;
flex-direction: column;
align-items: center;
}

h1 {
font-family: Impact, 'Arial Narrow', Arial, sans-serif;
font-size: 64px;
color: #FF6B1A;
letter-spacing: 4px;
text-align: center;
line-height: 1;
}

.sub {
font-size: 10px;
color: #888;
letter-spacing: 3px;
text-transform: uppercase;
text-align: center;
margin-bottom: 32px;
margin-top: 6px;
}

.card {
background: #1A1A1A;
border: 1px solid #3A3A3A;
border-top: 3px solid #FF6B1A;
width: 100%;
max-width: 520px;
padding: 28px;
margin-bottom: 24px;
}

label {
display: block;
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
color: #888;
margin-bottom: 6px;
margin-top: 18px;
}

label:first-of-type { margin-top: 0; }

.row {
display: flex;
background: #2A2A2A;
border: 1px solid #3A3A3A;
}

input[type=number] {
flex: 1;
background: transparent;
border: none;
outline: none;
color: #F0EDE8;
font-family: 'Courier New', Courier, monospace;
font-size: 20px;
font-weight: 500;
padding: 14px 16px;
-moz-appearance: textfield;
}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

input[type=text] {
flex: 1;
background: transparent;
border: none;
outline: none;
color: #FF6B1A;
font-family: 'Courier New', Courier, monospace;
font-size: 20px;
font-weight: 500;
padding: 14px 16px;
}

.unit {
font-size: 11px;
color: #888;
padding: 0 14px;
display: flex;
align-items: center;
white-space: nowrap;
}

.hint {
font-size: 10px;
color: #555;
letter-spacing: 1px;
margin-top: 6px;
}

button {
width: 100%;
margin-top: 24px;
background: #FF6B1A;
color: #0D0D0D;
border: none;
font-family: Impact, 'Arial Narrow', Arial, sans-serif;
font-size: 24px;
letter-spacing: 3px;
padding: 16px;
cursor: pointer;
}

#results-section { display: none; width: 100%; max-width: 520px; }

.array-card {
background: #1A1A1A;
border: 1px solid #3A3A3A;
border-top: 3px solid #FF6B1A;
padding: 24px;
margin-bottom: 16px;
}

.array-title {
font-family: Impact, 'Arial Narrow', Arial, sans-serif;
font-size: 20px;
letter-spacing: 3px;
color: #FF6B1A;
margin-bottom: 16px;
}

.answer {
background: #2A2A2A;
border-left: 4px solid #FF6B1A;
padding: 16px 20px;
margin-bottom: 14px;
}

.answer-label {
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
color: #888;
margin-bottom: 6px;
}

.answer-value {
font-family: Impact, 'Arial Narrow', Arial, sans-serif;
font-size: 48px;
color: #FF6B1A;
line-height: 1;
}

.answer-value small {
font-size: 20px;
color: #888;
margin-left: 4px;
}

.breakdown-title {
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
color: #888;
margin-bottom: 8px;
margin-top: 16px;
}

.brow {
display: flex;
justify-content: space-between;
padding: 8px 0;
border-bottom: 1px solid #2A2A2A;
font-size: 12px;
gap: 12px;
}

.brow:last-child { border-bottom: none; }
.brow .d { color: #888; flex-shrink: 0; }
.brow .v { color: #F0EDE8; text-align: right; }

.totals-card {
background: #111;
border: 2px solid #FF6B1A;
padding: 24px;
margin-bottom: 24px;
}

.totals-title {
font-family: Impact, 'Arial Narrow', Arial, sans-serif;
font-size: 22px;
letter-spacing: 3px;
color: #FF6B1A;
margin-bottom: 16px;
}

.total-row {
display: flex;
justify-content: space-between;
padding: 10px 0;
border-bottom: 1px solid #2A2A2A;
font-size: 13px;
}

.total-row:last-child { border-bottom: none; }
.total-row .td { color: #888; }
.total-row .tv {
font-family: Impact, 'Arial Narrow', Arial, sans-serif;
font-size: 22px;
color: #F0EDE8;
letter-spacing: 1px;
}

.footer {
font-size: 10px;
color: #3A3A3A;
letter-spacing: 3px;
text-transform: uppercase;
text-align: center;
margin-top: 8px;
margin-bottom: 32px;
}
</style>
</head>
<body>

<h1>Rail Calculator</h1>
<p class="sub">Created by Prosun Electrics PTY LTD</p>

<div class="card">
  <label>Panel Width</label>
  <div class="row">
    <input type="number" id="pw" value="1134">
    <span class="unit">mm</span>
  </div>

  <label>Mid Clamp Width</label>
  <div class="row">
    <input type="number" id="mc" value="20">
    <span class="unit">mm</span>
  </div>

  <label>Rail Length</label>
  <div class="row">
    <input type="number" id="rl" value="3600">
    <span class="unit">mm</span>
  </div>

  <label>Arrays (panels per array)</label>
  <div class="row">
    <input type="text" id="arrays" placeholder="e.g. 6,3,6,7,3">
  </div>
  <div class="hint">Enter panel counts separated by commas — one number per array</div>

  <button id="btn">CALCULATE</button>
</div>

<div id="results-section">
  <div id="arrays-container"></div>
  <div class="totals-card">
    <div class="totals-title">Job Totals</div>
    <div class="total-row"><span class="td">Total panels</span><span class="tv" id="tot-panels">-</span></div>
    <div class="total-row"><span class="td">Total rails required</span><span class="tv" id="tot-rails">-</span></div>
    <div class="total-row"><span class="td">Total clamps required</span><span class="tv" id="tot-clamps">-</span></div>
    <div class="total-row"><span class="td">Total joiners required</span><span class="tv" id="tot-joiners">-</span></div>
  </div>
</div>



<script>
document.getElementById('btn').addEventListener('click', function() {
  var pw = parseFloat(document.getElementById('pw').value);
  var mc = parseFloat(document.getElementById('mc').value);
  var rl = parseFloat(document.getElementById('rl').value);
  var arraysRaw = document.getElementById('arrays').value.trim();

  if (isNaN(pw) || isNaN(mc) || isNaN(rl) || !arraysRaw) {
    alert('Please fill in all fields');
    return;
  }

  var counts = arraysRaw.split(',').map(function(s) { return parseInt(s.trim()); }).filter(function(n) { return !isNaN(n) && n > 0; });

  if (!counts.length) {
    alert('Please enter at least one valid panel count');
    return;
  }

  renderResults(counts, pw, mc, rl);
});

function calcArray(np, pw, mc, rl) {
  var panelsMm = pw * np;
  var midsMm = (np + 1) * mc;
  var total = panelsMm + midsMm + 100;
  var clampsPerRow = np + 1;
  var totalClamps = clampsPerRow * 2;
  var fullLengths = Math.floor(total / rl);
  var remainder = Math.round(total % rl);
  var railsPerRow = fullLengths + (remainder > 0 ? 1 : 0);
  var totalRails = railsPerRow * 2;
  var joinersPerRow = railsPerRow > 1 ? railsPerRow - 1 : 0;
  var totalJoiners = joinersPerRow * 2;

  var railDesc = '';
  if (fullLengths > 0 && remainder > 0) {
    railDesc = fullLengths + ' x ' + rl + 'mm + 1 x ' + remainder + 'mm cut piece';
  } else if (fullLengths > 0 && remainder === 0) {
    railDesc = fullLengths + ' x ' + rl + 'mm full length' + (fullLengths > 1 ? 's' : '');
  } else {
    railDesc = '1 x ' + remainder + 'mm cut piece';
  }

  var totalDesc = '';
  if (fullLengths > 0 && remainder > 0) {
    var cut = (remainder * 2 <= rl) ? 1 : 2;
    var cutNote = cut === 1 ? '1 x full length (cut 2 x ' + remainder + 'mm pieces from it)' : '2 x cut piece to ' + remainder + 'mm';
    totalDesc = (fullLengths * 2) + ' x full lengths + ' + cutNote;
  } else if (fullLengths > 0 && remainder === 0) {
    totalDesc = (fullLengths * 2) + ' x full lengths';
  } else {
    var cut = (remainder * 2 <= rl) ? 1 : 2;
    totalDesc = cut === 1
      ? '1 x full length (cut 2 x ' + remainder + 'mm pieces from it)'
      : '2 x cut piece to ' + remainder + 'mm';
  }

  return { total, clampsPerRow, totalClamps, railsPerRow, totalRails, joinersPerRow, totalJoiners, railDesc, totalDesc };
}

function renderResults(counts, pw, mc, rl) {
  var container = document.getElementById('arrays-container');
  container.innerHTML = '';
  var grandPanels = 0, grandRails = 0, grandClamps = 0, grandJoiners = 0;

  counts.forEach(function(np, i) {
    var c = calcArray(np, pw, mc, rl);
    grandPanels += np;
    grandRails += c.totalRails;
    grandClamps += c.totalClamps;
    grandJoiners += c.totalJoiners;

    var div = document.createElement('div');
    div.className = 'array-card';
    div.innerHTML =
      '<div class="array-title">Array ' + (i + 1) + ' — ' + np + ' Panels</div>' +
      '<div class="answer"><div class="answer-label">Cut Rail Length</div><div class="answer-value">' + c.total.toLocaleString() + '<small>mm</small></div></div>' +
      '<div class="breakdown-title">Rails</div>' +
      '<div class="brow"><span class="d">Total for array</span><span class="v">' + c.totalDesc + '</span></div>';
    container.appendChild(div);
  });

  document.getElementById('tot-panels').textContent = grandPanels;
  document.getElementById('tot-rails').textContent = grandRails;
  document.getElementById('tot-clamps').textContent = grandClamps;
  document.getElementById('tot-joiners').textContent = grandJoiners > 0 ? grandJoiners : 'None';
  document.getElementById('results-section').style.display = 'block';
}
</script>
<p class="footer">Optimised for Clenergy</p>

</body>
</html>
